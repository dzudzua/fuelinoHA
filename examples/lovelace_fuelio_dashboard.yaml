type: sections
max_columns: 3
title: Fuelio
path: fuelio
sections:
  - type: grid
    cards:
      - type: heading
        heading: Auto a posledni tankovani
      - type: tile
        entity: sensor.hyundai_i30_last_fill_date
        name: Posledni tankovani
      - type: tile
        entity: sensor.hyundai_i30_last_fill_cost
        name: Posledni cena
      - type: tile
        entity: sensor.hyundai_i30_last_fill_volume
        name: Posledni objem
      - type: tile
        entity: sensor.hyundai_i30_last_price_per_unit
        name: Cena za litr
      - type: tile
        entity: sensor.hyundai_i30_last_consumption
        name: Posledni spotreba
      - type: tile
        entity: sensor.hyundai_i30_last_city
        name: Posledni mesto
      - type: tile
        entity: sensor.hyundai_i30_odometer
        name: Tachometr
      - type: tile
        entity: sensor.hyundai_i30_days_since_full_tank
        name: Dnu od plne nadrze
      - type: tile
        entity: sensor.hyundai_i30_km_since_full_tank
        name: Km od plne nadrze
  - type: grid
    cards:
      - type: heading
        heading: Naklady a trend
      - type: statistic
        entity: sensor.hyundai_i30_fuel_cost_this_month
        name: Palivo tento mesic
      - type: statistic
        entity: sensor.hyundai_i30_expense_cost_this_month
        name: Ostatni vydaje tento mesic
      - type: statistic
        entity: sensor.hyundai_i30_total_vehicle_cost
        name: Celkove naklady auta
      - type: statistic
        entity: sensor.hyundai_i30_last_month_cost
        name: Palivo minuly mesic
      - type: statistic
        entity: sensor.hyundai_i30_month_over_month_cost_delta
        name: Rozdil proti minulemu mesici
      - type: statistic
        entity: sensor.hyundai_i30_cost_30d
        name: Palivo za 30 dni
      - type: statistic
        entity: sensor.hyundai_i30_average_cost_per_km
        name: Prumerna cena za km
      - type: statistic
        entity: sensor.hyundai_i30_fuel_price_trend
        name: Trend ceny paliva
      - type: statistic
        entity: sensor.hyundai_i30_average_price_5_fills
        name: Prumerna cena 5 tankovani
  - type: grid
    cards:
      - type: heading
        heading: Spotreba a jizdni profil
      - type: tile
        entity: sensor.hyundai_i30_average_consumption
        name: Prumerna spotreba
      - type: tile
        entity: sensor.hyundai_i30_average_consumption_30d
        name: Spotreba za 30 dni
      - type: tile
        entity: sensor.hyundai_i30_last_month_average_consumption
        name: Spotreba minuly mesic
      - type: tile
        entity: sensor.hyundai_i30_best_consumption
        name: Nejlepsi spotreba
      - type: tile
        entity: sensor.hyundai_i30_worst_consumption
        name: Nejhorsi spotreba
      - type: tile
        entity: sensor.hyundai_i30_average_fill_volume
        name: Prumerny objem tankovani
      - type: tile
        entity: sensor.hyundai_i30_average_days_between_fills
        name: Prumer dnu mezi tankovanimi
      - type: tile
        entity: sensor.hyundai_i30_average_distance_between_fills
        name: Prumerna vzdalenost mezi tankovanimi
      - type: tile
        entity: sensor.hyundai_i30_distance_this_month
        name: Vzdalenost tento mesic
  - type: grid
    cards:
      - type: heading
        heading: Pumpy a mista
      - type: tile
        entity: sensor.hyundai_i30_favorite_station
        name: Nejcastejsi pumpa
      - type: tile
        entity: sensor.hyundai_i30_favorite_station_id
        name: Nejcastejsi ID pumpy
      - type: tile
        entity: sensor.hyundai_i30_favorite_city
        name: Nejcastejsi mesto
      - type: tile
        entity: sensor.hyundai_i30_different_stations_count
        name: Ruzne pumpy
      - type: tile
        entity: sensor.hyundai_i30_different_cities_count
        name: Ruzna mesta
      - type: markdown
        title: Posledni 3 mesta
        content: >
          {% set cities = state_attr('sensor.hyundai_i30_last_fill_date', 'recent_cities') or [] %}
          {% for city in cities %}
          - {{ city }}
          {% endfor %}
  - type: grid
    cards:
      - type: heading
        heading: Servis a ostatni vydaje
      - type: tile
        entity: sensor.hyundai_i30_last_expense_date
        name: Posledni vydaj
      - type: tile
        entity: sensor.hyundai_i30_last_expense_cost
        name: Cena posledniho vydaje
      - type: tile
        entity: sensor.hyundai_i30_expense_count
        name: Pocet vydaju
      - type: tile
        entity: sensor.hyundai_i30_total_expense_cost
        name: Celkove ostatni vydaje
      - type: tile
        entity: sensor.hyundai_i30_last_service_date
        name: Posledni servis
      - type: tile
        entity: sensor.hyundai_i30_last_service_cost
        name: Cena posledniho servisu
      - type: tile
        entity: sensor.hyundai_i30_top_expense_category
        name: Nejvetsi kategorie vydaju
      - type: tile
        entity: sensor.hyundai_i30_service_cost_total
        name: Celkem servis a udrzba
      - type: tile
        entity: sensor.hyundai_i30_wash_cost_total
        name: Celkem myti
      - type: tile
        entity: sensor.hyundai_i30_registration_cost_total
        name: Celkem registrace
      - type: tile
        entity: sensor.hyundai_i30_parking_cost_total
        name: Celkem parkovani
      - type: tile
        entity: sensor.hyundai_i30_toll_cost_total
        name: Celkem mytne
      - type: tile
        entity: sensor.hyundai_i30_insurance_cost_total
        name: Celkem pojisteni
      - type: markdown
        title: Posledni vydaje
        content: >
          {% set expenses = state_attr('sensor.hyundai_i30_last_fill_date', 'recent_expenses') or [] %}
          {% for expense in expenses %}
          - **{{ expense.date }}** | {{ expense.title or 'Bez nazvu' }} |
          {{ expense.cost }} | {{ expense.category_name or 'Bez kategorie' }}
          {% endfor %}
      - type: markdown
        title: Souhrn kategorii vydaju
        content: >
          {% set categories = state_attr('sensor.hyundai_i30_last_fill_date', 'expense_category_summary') or [] %}
          {% for category in categories %}
          - **{{ category.category_name }}** | pocet: {{ category.count }} |
          celkem: {{ category.total_cost }}
          {% endfor %}
  - type: grid
    cards:
      - type: heading
        heading: TripLog a jizdy
      - type: tile
        entity: sensor.hyundai_i30_last_trip_date
        name: Posledni jizda
      - type: tile
        entity: sensor.hyundai_i30_last_trip_distance
        name: Vzdalenost posledni jizdy
      - type: tile
        entity: sensor.hyundai_i30_last_trip_cost
        name: Cena posledni jizdy
      - type: tile
        entity: sensor.hyundai_i30_trip_count
        name: Pocet jizd
      - type: tile
        entity: sensor.hyundai_i30_total_trip_distance
        name: Celkova vzdalenost jizd
      - type: tile
        entity: sensor.hyundai_i30_average_trip_cost_per_km
        name: Prumerna cena jizdy za km
      - type: markdown
        title: Posledni jizdy
        content: >
          {% set trips = state_attr('sensor.hyundai_i30_last_fill_date', 'recent_trips') or [] %}
          {% for trip in trips %}
          - **{{ trip.date }}** | {{ trip.title or 'Bez nazvu' }} |
          {{ trip.distance_km }} km | {{ trip.trip_cost }} |
          {{ trip.start_name or 'Start' }} -> {{ trip.end_name or 'Cil' }}
          {% endfor %}
  - type: grid
    cards:
      - type: heading
        heading: Rekordy
      - type: tile
        entity: sensor.hyundai_i30_lowest_price_per_unit
        name: Nejnizsi cena
      - type: tile
        entity: sensor.hyundai_i30_highest_price_per_unit
        name: Nejvyssi cena
      - type: tile
        entity: sensor.hyundai_i30_most_expensive_fill
        name: Nejdrazsi tankovani
      - type: tile
        entity: sensor.hyundai_i30_least_expensive_fill
        name: Nejlevnejsi tankovani
      - type: tile
        entity: sensor.hyundai_i30_last_fill_temperature
        name: Teplota pri tankovani
      - type: tile
        entity: sensor.hyundai_i30_fill_count
        name: Celkovy pocet tankovani
      - type: tile
        entity: sensor.hyundai_i30_last_month_fill_count
        name: Tankovani minuly mesic
      - type: tile
        entity: sensor.hyundai_i30_fill_count_30d
        name: Tankovani za 30 dni
      - type: tile
        entity: sensor.hyundai_i30_tracked_distance
        name: Sledovana vzdalenost
  - type: grid
    cards:
      - type: heading
        heading: Historie
      - type: markdown
        title: Posledni tankovani
        content: >
          {% set fills = state_attr('sensor.hyundai_i30_last_fill_date', 'recent_fills') or [] %}
          {% for fill in fills %}
          - **{{ fill.date }}** | {{ fill.volume }} L | {{ fill.cost }} |
          {{ fill.city or fill.station_id or 'Neznama pumpa' }} |
          {{ 'castecne' if fill.is_partial else 'plne' }}{% if fill.temperature is not none %}
          | {{ fill.temperature }} C{% endif %}{% if fill.weather_description %}
          | {{ fill.weather_description }}{% endif %}
          {% endfor %}
      - type: markdown
        title: Mesicni souhrn
        content: >
          {% set months = state_attr('sensor.hyundai_i30_last_fill_date', 'monthly_summary') or [] %}
          {% for month in months %}
          - **{{ month.year }}-{{ '%02d'|format(month.month) }}** | tankovani: {{ month.fill_count }} |
          naklady: {{ month.total_cost }} | objem: {{ month.total_volume }} |
          vzdalenost: {{ month.distance }} | prumerna cena: {{ month.average_price }}
          {% endfor %}
